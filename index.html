<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ИОН Студия — разработка сайтов и дизайн интерфейсов</title>

    <meta name="keywords" content="разработка сайтов, создание сайтов, веб-разработка, дизайн интерфейсов, UX UI, лендинг под ключ, студия веб-разработки, разработка на заказ, сайт под ключ, дизайн сайта, веб-студия" />
    <meta name="author" content="ИОН Студия, ООО Т Трэвел" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://ionstudio.ru/" id="canonical-link" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ru_RU" />
    <meta property="og:site_name" content="ИОН Студия" />
    <meta property="og:title" content="ИОН Студия — разработка сайтов и дизайн интерфейсов" />
    <meta property="og:description" content="Студия разработки сайтов и цифровых продуктов. Веб-разработка, UX/UI дизайн, лендинги. От идеи до запуска." />
    <meta property="og:url" content="https://ionstudio.ru/" id="og-url" />
    <meta property="og:image" content="https://ionstudio.ru/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ИОН Студия — разработка сайтов и дизайн" />
    <meta name="twitter:description" content="Студия разработки сайтов и цифровых продуктов. Веб-разработка, UX/UI, лендинги." />

    <!-- JSON-LD: Organization для поисковиков -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ИОН Студия",
      "alternateName": "ION Studio",
      "url": "https://ionstudio.ru",
      "description": "Студия разработки сайтов и цифровых продуктов. Веб-разработка, UX/UI дизайн, лендинги.",
      "foundingDate": "2022",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "url": "https://ionstudio.ru/contact",
        "availableLanguage": "Russian"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ИОН Студия",
      "url": "https://ionstudio.ru",
      "potentialAction": {
        "@type": "SearchAction",
        "target": { "@type": "EntryPoint", "urlTemplate": "https://ionstudio.ru/contact" },
        "query-input": "required name=search"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
